name: CI / Security Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Note: For HTML/CSS only, linting is optional but good practice.
      # We would run `npx htmlhint "**/*.html"` and `npx stylelint "**/*.css"` here

  security_gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Secret Scanning (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: SAST Scanning (Semgrep)
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/default"
          
      - name: Build local container image for vulnerability scanning
        run: docker build -t portfolio-local:test .
        
      - name: Container Scanning (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'portfolio-local:test'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  build_and_push:
    needs: [lint, security_gate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ghcr.io/${{ github.repository }}/portfolio:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/portfolio:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/portfolio:buildcache,mode=max
