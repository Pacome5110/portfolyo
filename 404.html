<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Pacome.dev</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 1rem;
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>
<body>
    <main class="error-page section">
        <h1 class="error-code">404</h1>
        <h2 style="font-size: 2rem; margin-bottom: 1rem;">Lost in space?</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">The page you are looking for doesn't exist or has been moved.</p>
        <a href="/" class="btn btn-primary">Return Home</a>
    </main>
</body>
</html>
